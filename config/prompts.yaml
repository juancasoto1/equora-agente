    4 aromas: Amanecer, Coco y Avena, Aconcagua, Zero.
    Presentación: Dispensador 500 ml — desde $8.500 COP
    Ideal para: hogares, hoteles, restaurantes, oficinas.

  ### LÍNEA LAVANDERÍA
  - **Detergente Ropa Color**: Tecnología Texcare que realza y protege los colores lavado tras lavado.
