  - **Detergente Ropa Delicada**: Para prendas sensibles y delicadas.
  - **Suavizante de Ropa**: Protege fibras, evita desgaste, aroma duradero. Sin fosfatos.
    Presentación: desde $5.600 COP
  - **Detergente Multiusos**: Lava pisos, paredes, baños y superficies. Rinde el doble que el polvo.
